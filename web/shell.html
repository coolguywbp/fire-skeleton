<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Fire Skeleton Invader</title>
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #000; overflow: hidden;
    }
    body { display: flex; align-items: center; justify-content: center; }
    /* The canvas renders at the game's native 1280x960 (4:3) buffer. With
       high-DPI disabled on the web build the buffer matches the element, so a
       plain uniform max-* fit keeps the aspect (no squish) and maps the mouse
       1:1. (An aspect-ratio + width/height:auto combo collapsed it to 0 height
       -> black screen, so keep this simple.) */
    canvas#canvas {
      display: block; border: 0; outline: none; background: #000;
      max-width: 100%; max-height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
  <script type="text/javascript">
    var Module = {
      canvas: document.getElementById('canvas'),
      // Keep stdout/stderr in the devtools console (handy for bug reports).
      print:    function (t) { console.log(t); },
      printErr: function (t) { console.error(t); },
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
