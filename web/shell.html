<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- viewport-fit=cover + no user scaling: the canvas owns the whole screen,
       including under notches, and touches drive the game instead of zooming. -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Fire Skeleton Invader</title>
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #000; overflow: hidden;
      font-family: system-ui, "Liberation Sans", Arial, sans-serif;
    }
    /* The canvas fills the viewport on desktop and mobile. The C side keeps the
       canvas backing store matched to the viewport (see web_fit_canvas), and the
       renderer letterboxes the fixed 1280x960 world into it -- so the game is
       always full-screen with no squish, at any size or orientation.
       touch-action:none stops the browser from scrolling/zooming on drags. */
    canvas#canvas {
      display: block; border: 0; outline: none; background: #000;
      width: 100vw; height: 100vh;
      touch-action: none; -webkit-tap-highlight-color: transparent;
    }
    /* Loading splash in the main-menu style: black, white text, a bobbing fire
       skeleton on the right. Shown while the ~4 MB wasm+assets download and
       compile (the canvas is black until then), faded out once ready. */
    #loading {
      position: fixed; inset: 0; z-index: 10; background: #000;
      display: flex; align-items: center; justify-content: center;
      gap: 5vw; flex-wrap: wrap; padding: 6vw; box-sizing: border-box;
      transition: opacity .4s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .col { display: flex; flex-direction: column; }
    #loading h1 {
      margin: 0; color: #fff; font-weight: 800; line-height: 1.05;
      font-size: clamp(40px, 8vw, 120px); letter-spacing: .01em;
    }
    #loading .status {
      margin-top: 2.2em; color: #fff; font-size: clamp(20px, 3vw, 44px);
      letter-spacing: .12em; min-height: 1.2em;
    }
    #loading img {
      width: clamp(150px, 30vw, 340px); height: auto;
      image-rendering: pixelated;             /* crisp upscale, like in-game */
      animation: bob 2.6s ease-in-out infinite;
    }
    @keyframes bob { 0%, 100% { transform: translateY(-20px); }
                     50%      { transform: translateY(20px);  } }
    /* Rotate-to-landscape prompt. The game world is a fixed 4:3 landscape, so on
       a tall portrait phone it can only letterbox to a small band. Rather than
       crop gameplay (overscan) or CSS-rotate the canvas (which would misalign
       touch input), we ask the player to turn the device; in landscape the game
       fills the screen. Shown only on small portrait viewports (phones). */
    #rotate {
      display: none;
      position: fixed; inset: 0; z-index: 20; background: #000; color: #fff;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 28px; text-align: center; padding: 10vw; box-sizing: border-box;
    }
    @media (orientation: portrait) and (max-width: 820px) {
      #rotate { display: flex; }
    }
    #rotate .icon {
      font-size: clamp(64px, 22vw, 140px); line-height: 1; color: #e6783c;
      animation: turn 2.4s ease-in-out infinite;
    }
    #rotate h2 { margin: 0; width: 100%; font-weight: 800; letter-spacing: .04em;
                 font-size: clamp(20px, 7vw, 36px); overflow-wrap: anywhere; }
    #rotate p { margin: 0; width: 100%; color: #aaa; overflow-wrap: anywhere;
                font-size: clamp(12px, 3.2vw, 16px); }
    @keyframes turn { 0%, 100% { transform: rotate(-90deg); }
                      50%      { transform: rotate(0deg);   } }
  </style>
  <script type="text/javascript">
    // SDL (emscripten) attaches a keyboard handler that preventDefault()s
    // keydowns, which swallows the browser's reload shortcuts (F5, Ctrl/Cmd+R,
    // Ctrl+Shift+R) -- so refreshing the page did nothing. Catch those combos
    // in the capture phase on window (before SDL's handler) and stop them from
    // reaching it, letting the browser perform its native (cache-bypassing)
    // reload. The game never uses these keys, so nothing is lost.
    window.addEventListener('keydown', function (e) {
      var isReload = e.key === 'F5' ||
                     ((e.ctrlKey || e.metaKey) && (e.key === 'r' || e.key === 'R'));
      if (isReload) e.stopImmediatePropagation();
    }, true);
  </script>
</head>
<body>
  <div id="rotate">
    <div class="icon">&#x21BB;</div>
    <h2>ROTATE YOUR DEVICE</h2>
    <p>Best played in landscape</p>
  </div>
  <div id="loading">

  <canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
  <script type="text/javascript">
    var loadEl   = document.getElementById('loading');
    var statusEl = document.getElementById('loadStatus');
    var loaderHidden = false;

    function hideLoader() {
      if (loaderHidden) return;
      loaderHidden = true;
      loadEl.classList.add('hidden');
      setTimeout(function () { loadEl.style.display = 'none'; }, 450);
    }

    var Module = {
      canvas: document.getElementById('canvas'),
      // Keep stdout/stderr in the devtools console (handy for bug reports).
      print:    function (t) { console.log(t); },
      printErr: function (t) { console.error(t); },

      setStatus: function (text) {
        if (!text) { hideLoader(); return; }
        // Emscripten emits e.g. "Downloading... (loaded/total)" -- bytes for the
        // data file, a dependency count at startup. The browser's XHR `loaded`
        // can briefly overshoot `total` (and dependency bookkeeping can too), so
        // the raw ratio sometimes exceeds 100%. Guard the divisor and clamp.
        var m = text.match(/\((\d+(\.\d+)?)\/(\d+)\)/);
        if (m) {
          var total = parseFloat(m[3]);
          var pct = total > 0 ? Math.round(parseFloat(m[1]) / total * 100) : 0;
          pct = Math.max(0, Math.min(100, pct));
          statusEl.textContent = 'LOADING ' + pct + '%';
        } else {
          statusEl.textContent = 'LOADING…';
        }
      },
      monitorRunDependencies: function () {},
      // First frame is about to run -- drop the splash.
      onRuntimeInitialized: function () { setTimeout(hideLoader, 200); },
    };
    Module.setStatus('Downloading…');
    // Safety net: never leave the splash stuck if a status event is missed.
    window.addEventListener('error', hideLoader);
  </script>
